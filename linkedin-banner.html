<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        font-family: 'Arial', sans-serif;
        background: #0f172a;
      }
      .banner {
        width: 1584px;
        height: 396px;
        background: #0f172a;
        position: relative;
        overflow: hidden;
      }
      /* Network graphic - nodes and connecting lines */
      .network-bg {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      .network-node {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #2dd4bf;
        border-radius: 50%;
        opacity: 0.15;
      }
      .network-node.large {
        width: 12px;
        height: 12px;
        opacity: 0.25;
      }
      .network-line {
        position: absolute;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(45, 212, 191, 0.15) 0%,
          rgba(45, 212, 191, 0.05) 50%,
          rgba(45, 212, 191, 0.15) 100%
        );
        transform-origin: left center;
      }
      .tech-icons {
        position: absolute;
        left: 15px;
        top: 15px;
        width: 380px;
        height: 220px;
        z-index: 3;
      }
      .tech-icon {
        position: absolute;
        color: #2dd4bf;
        font-size: 42px;
        transition:
          opacity 0.3s,
          transform 0.3s;
      }
      .tech-icon:hover {
        opacity: 1 !important;
        transform: scale(1.1);
      }
      /* Priority icons - higher opacity */
      .tech-icon.priority {
        opacity: 0.9;
      }
      /* Medium priority */
      .tech-icon.medium {
        opacity: 0.55;
      }
      /* Lower priority */
      .tech-icon.low {
        opacity: 0.3;
      }
      /* Scattered positions - staying in upper left, avoiding profile photo circle and main content (starts ~420px) */
      .tech-icon:nth-child(1) {
        top: 14px;
        left: 10px;
      } /* Vue - priority */
      .tech-icon:nth-child(2) {
        top: 5px;
        left: 130px;
      } /* React - priority */
      .tech-icon:nth-child(3) {
        top: 72px;
        left: 5px;
      } /* TypeScript - priority */
      .tech-icon:nth-child(4) {
        top: 8px;
        left: 197px;
      } /* PHP - priority */
      .tech-icon:nth-child(5) {
        top: 35px;
        left: 68px;
      } /* Tailwind - priority */
      .tech-icon:nth-child(6) {
        top: 62px;
        left: 172px;
      } /* Laravel - priority */
      .tech-icon:nth-child(7) {
        top: 55px;
        left: 251px;
      } /* Nuxt - priority */
      .tech-icon:nth-child(8) {
        top: 20px;
        left: 289px;
      } /* HTML - priority */
      .tech-icon:nth-child(9) {
        top: 80px;
        left: 108px;
      } /* Node - medium */
      .tech-icon:nth-child(10) {
        top: 101px;
        left: 227px;
      } /* SQL - medium */
      .tech-icon:nth-child(11) {
        top: 108px;
        left: 61px;
      } /* Figma - medium */
      .tech-icon:nth-child(12) {
        top: 155px;
        left: 165px;
      } /* Astro - medium */
      .tech-icon:nth-child(13) {
        top: 84px;
        left: 311px;
      } /* Elastic - low */
      .tech-icon:nth-child(14) {
        top: 132px;
        left: 2px;
      } /* Angular - low */
      .tech-icon:nth-child(15) {
        top: 143px;
        left: 302px;
      } /* Bootstrap - low */

      .main-content {
        position: absolute;
        left: 420px;
        right: 40px;
        top: 44%;
        transform: translateY(-50%);
        z-index: 3;
      }
      .title {
        font-size: 40px;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .subtitle {
        font-size: 32px;
        color: #2dd4bf;
        font-weight: 600;
        margin-bottom: 30px;
      }
      .kpis {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-top: 20px;
        width: 100%;
      }
      .kpi {
        background: rgba(45, 212, 191, 0.05);
        padding: 16px 12px;
        border-radius: 8px;
        border: 1px solid rgba(45, 212, 191, 0.2);
        text-align: center;
      }
      .kpi-value {
        font-size: 24px;
        font-weight: 700;
        color: #2dd4bf;
        display: block;
        margin-bottom: 8px;
      }
      .kpi-label {
        font-size: 16px;
        color: #cbd5e1;
        line-height: 1.4;
        display: block;
      }
      .footer {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: #057a55;
        padding: 24px 40px 24px 40px;
        color: white;
        font-size: 19px;
        font-weight: 600;
        text-align: right;
        letter-spacing: 0.3px;
        z-index: 2;
      }
      .accent-line {
        width: 60px;
        height: 3px;
        background: #2dd4bf;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <!-- Network graphic (SVG) placed at the bottom, behind the footer -->
      <svg
        class="network-bg"
        viewBox="0 0 1584 396"
        preserveAspectRatio="xMidYMid slice"
        aria-hidden="true"
      >
        <!-- LEFT-LEANING NETWORK: denser, taller, using #2dd4bf for strokes/fills -->
        <g fill="none" stroke="#2dd4bf" stroke-width="1">
          <!-- vertical columns (reach higher toward mid area but kept left so main content safe) -->
          <line x1="20" y1="380" x2="20" y2="180" stroke-opacity="0.10" />
          <line x1="80" y1="380" x2="80" y2="170" stroke-opacity="0.095" />
          <line x1="140" y1="380" x2="140" y2="160" stroke-opacity="0.09" />
          <line x1="200" y1="380" x2="200" y2="150" stroke-opacity="0.085" />
          <line x1="260" y1="380" x2="260" y2="170" stroke-opacity="0.08" />
          <line x1="320" y1="380" x2="320" y2="190" stroke-opacity="0.07" />

          <!-- horizontal and diagonal mesh -->
          <line x1="20" y1="320" x2="140" y2="320" stroke-opacity="0.06" />
          <line x1="80" y1="300" x2="200" y2="300" stroke-opacity="0.055" />
          <line x1="140" y1="260" x2="260" y2="260" stroke-opacity="0.05" />
          <line x1="200" y1="220" x2="320" y2="220" stroke-opacity="0.045" />

          <!-- cross connections between columns -->
          <line x1="20" y1="260" x2="200" y2="220" stroke-opacity="0.05" />
          <line x1="80" y1="300" x2="260" y2="260" stroke-opacity="0.045" />
          <line x1="140" y1="320" x2="320" y2="190" stroke-opacity="0.04" />
          <line x1="20" y1="380" x2="320" y2="190" stroke-opacity="0.035" />

          <!-- smaller diagonal ties for density -->
          <line x1="60" y1="340" x2="140" y2="260" stroke-opacity="0.04" />
          <line x1="100" y1="360" x2="240" y2="280" stroke-opacity="0.035" />
          <line x1="160" y1="340" x2="300" y2="260" stroke-opacity="0.03" />
        </g>

        <g fill="#2dd4bf" fill-opacity="0.16">
          <!-- primary vertical nodes (from bottom up) -->
          <circle cx="20" cy="380" r="6" />
          <circle cx="20" cy="320" r="6" />
          <circle cx="20" cy="260" r="7" />
          <circle cx="20" cy="200" r="5" />

          <circle cx="80" cy="380" r="6" />
          <circle cx="80" cy="320" r="6" />
          <circle cx="80" cy="260" r="6" />
          <circle cx="80" cy="200" r="5" />

          <circle cx="140" cy="380" r="6" />
          <circle cx="140" cy="320" r="7" />
          <circle cx="140" cy="260" r="6" />
          <circle cx="140" cy="200" r="5" />

          <circle cx="200" cy="380" r="6" />
          <circle cx="200" cy="320" r="6" />
          <circle cx="200" cy="260" r="6" />
          <circle cx="200" cy="200" r="4" />

          <circle cx="260" cy="360" r="6" />
          <circle cx="260" cy="300" r="5" />
          <circle cx="260" cy="240" r="4" />

          <circle cx="320" cy="340" r="6" />
          <circle cx="320" cy="280" r="5" />
          <circle cx="320" cy="200" r="4" />

          <!-- peripheral nodes -->
          <circle cx="240" cy="280" r="4" />
          <circle cx="300" cy="260" r="4" />
          <circle cx="360" cy="240" r="4" />
        </g>
      </svg>

      <!-- Tech Icons - Scattered -->
      <div class="tech-icons">
        <i class="ti ti-brand-vue tech-icon priority" title="Vue.js"></i>
        <i class="ti ti-brand-react tech-icon priority" title="React"></i>
        <i
          class="ti ti-brand-typescript tech-icon priority"
          title="TypeScript"
        ></i>
        <i class="ti ti-brand-php tech-icon priority" title="PHP"></i>
        <i class="ti ti-brand-tailwind tech-icon priority" title="Tailwind"></i>
        <i class="ti ti-brand-laravel tech-icon priority" title="Laravel"></i>
        <i class="ti ti-brand-nuxt tech-icon priority" title="Nuxt.js"></i>
        <i class="ti ti-html tech-icon priority" title="HTML"></i>
        <i class="ti ti-brand-nodejs tech-icon medium" title="Node.js"></i>
        <i class="ti ti-sql tech-icon medium" title="SQL"></i>
        <i class="ti ti-brand-figma tech-icon medium" title="Figma"></i>
        <i class="ti ti-brand-astro tech-icon medium" title="Astro"></i>
        <i class="ti ti-brand-elastic tech-icon low" title="Elasticsearch"></i>
        <i class="ti ti-brand-angular tech-icon low" title="Angular"></i>
        <i class="ti ti-brand-bootstrap tech-icon low" title="Bootstrap"></i>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="accent-line"></div>
        <div class="title">FULLSTACK DEVELOPER</div>
        <div class="subtitle">Crafting scalable and modern web applications</div>

        <div class="kpis">
          <div class="kpi">
            <span class="kpi-value">2+ YEARS</span>
            <span class="kpi-label">From idea to production</span>
          </div>
          <div class="kpi">
            <span class="kpi-value">800+ COMMITS</span>
            <span class="kpi-label">Only in last year</span>
          </div>
          <div class="kpi">
            <span class="kpi-value">5+ SECTORS</span>
            <span class="kpi-label">E-commerce • Logistics • more</span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        🌍 OPEN TO REMOTE WORK • OR RELOCATION
        • AVAILABLE IMMEDIATELY
      </div>
    </div>
  </body>
</html>
